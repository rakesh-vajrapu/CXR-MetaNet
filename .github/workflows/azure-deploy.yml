name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'api.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/**'
      # Frontend changes don't trigger backend rebuilds (Vercel handles frontend)
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: cxrmetanet.azurecr.io
  IMAGE_NAME: cxrmetanet.azurecr.io/cxr-metanet-api:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: false # We are bypassing LFS for the massive dataset

      - name: Download Dataset from Azure Blob Storage
        run: |
          echo "Downloading images.zip from Azure Blob..."
          mkdir -p Dataset
          curl -o Dataset/images.zip -L "https://cxrmetanetdataset.blob.core.windows.net/datasets/images.zip"
          
          echo "Extracting dataset..."
          python setup_dataset.py
          
          echo "Verifying extraction..."
          ls -la Dataset/images/ | head -n 5

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ env.IMAGE_NAME }} .
          
          echo "Pushing Docker image to ACR..."
          docker push ${{ env.IMAGE_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Trigger Azure App Service Restart
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'CXR-MetaNet-App'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}
