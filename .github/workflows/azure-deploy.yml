name: Deploy Frontend Changes to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'api.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: cxrmetanet.azurecr.io
  IMAGE_NAME: cxrmetanet.azurecr.io/cxr-metanet-api:latest

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[deploy]') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'CXR-MetaNet-App'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}
