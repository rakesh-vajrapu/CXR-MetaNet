name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'api.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/**'
      # Frontend changes don't trigger backend rebuilds (Vercel handles frontend)
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: cxrmetanet.azurecr.io
  IMAGE_NAME: cxrmetanet.azurecr.io/cxr-metanet-api:latest
  BLOB_BASE_URL: https://cxrmetanetdataset.blob.core.windows.net/datasets

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: false   # Models are now on Azure Blob Storage, not Git LFS

      - name: Download Models from Azure Blob Storage
        run: |
          echo "Downloading model weights from Azure Blob Storage..."
          mkdir -p Models/densenet121 Models/convnext_v2_base Models/maxvit_base

          curl -o Models/densenet121/best_tta.pth         -L "${{ env.BLOB_BASE_URL }}/models/densenet121.pth"
          echo "✓ DenseNet-121 downloaded"

          curl -o Models/convnext_v2_base/best_tta.pth    -L "${{ env.BLOB_BASE_URL }}/models/convnextv2_base.pth"
          echo "✓ ConvNeXtV2-Base downloaded"

          curl -o Models/maxvit_base/best_tta.pth         -L "${{ env.BLOB_BASE_URL }}/models/maxvit_base.pth"
          echo "✓ MaxViT-Base downloaded"

          curl -o Models/meta_learner_logistic.pkl         -L "${{ env.BLOB_BASE_URL }}/models/meta_learner.pkl"
          echo "✓ Meta-Learner downloaded"

          echo "Verifying downloads..."
          ls -lh Models/densenet121/ Models/convnext_v2_base/ Models/maxvit_base/ Models/meta_learner_logistic.pkl

      - name: Download Dataset from Azure Blob Storage
        run: |
          echo "Downloading images.zip from Azure Blob..."
          mkdir -p Dataset
          curl -o Dataset/images.zip -L "${{ env.BLOB_BASE_URL }}/images.zip"
          
          echo "Extracting dataset..."
          python setup_dataset.py
          
          echo "Verifying extraction..."
          ls -la Dataset/images/ | head -n 5

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ env.IMAGE_NAME }} .
          
          echo "Pushing Docker image to ACR..."
          docker push ${{ env.IMAGE_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Trigger Azure App Service Restart
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'CXR-MetaNet-App'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_NAME }}
